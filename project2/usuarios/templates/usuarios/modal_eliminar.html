<div class="modal-content" style="background-color: #111827; border-radius: 12px; overflow: hidden;">
    <div class="modal-header" style="padding: 20px; border-bottom: 1px solid #374151;">
        <h2 style="margin: 0; display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-user-slash"></i> Desactivar Usuario
        </h2>
    </div>

    <div class="modal-body" style="padding: 40px 30px; text-align: center;">
        <div style="margin-bottom: 25px;">
            <i class="fas fa-ban" style="font-size: 5rem; color: #ef4444; opacity: 0.9;"></i>
        </div>
        <h4 style="font-size: 1.25rem; margin-bottom: 15px; color: #f3f4f6;">
            ¿Desactivar al usuario "<span id="nombreUsuarioEliminar" style="color: #38bdf8;"></span>"?
        </h4>
        <p style="color: #9ca3af; line-height: 1.6; max-width: 90%; margin: 0 auto;">
            El usuario no podrá iniciar sesión en el sistema hasta que sea reactivado manualmente por un administrador.
        </p>
    </div>

    <form id="formEliminar" method="post">
        {% csrf_token %}
    </form>

    <div class="modal-footer" style="padding: 20px 30px; background-color: #1f2937; display: flex; gap: 15px; justify-content: center;">
        <button type="button" class="btn-cancel" onclick="cerrarModal('modalDelete')" 
                style="flex: 1; padding: 12px; border-radius: 8px; font-weight: 600; max-width: 160px;">
            Cancelar
        </button>
        <button type="submit" form="formEliminar" class="btn-save" 
                style="flex: 1; padding: 12px; border-radius: 8px; font-weight: 600; background-color: #ef4444; color: white; border: none; max-width: 220px;">
            Confirmar Desactivación
        </button>
    </div>
</div>
