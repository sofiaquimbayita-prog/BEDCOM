<div class="modal-content">
    <div class="modal-header" style="background: linear-gradient(135deg, var(--danger), #e55a5a); color: white;">
        <h2><i class="fas fa-user-slash"></i> Desactivar Usuario</h2>
        <button class="close-modal" onclick="cerrarModal('modalDelete')">&times;</button>
    </div>
    <div class="modal-body text-center">
        <i class="fas fa-exclamation-triangle" style="font-size: 4rem; color: var(--danger); margin-bottom: 20px;"></i>
        <h4>¿Desactivar al usuario "<span id="nombreEliminar"></span>"?</h4>
        <p class="text-muted">El usuario no podrá iniciar sesión hasta ser reactivado por un administrador.</p>
    </div>
    <form id="formEliminar" method="post">
        {% csrf_token %}
    </form>
    <div class="modal-footer">
        <button type="button" class="btn-cancel" onclick="cerrarModal('modalDelete')">Cancelar</button>
        <button type="submit" form="formEliminar" class="btn-save" style="background: var(--danger);">Confirmar Desactivación</button>
    </div>
</div>
