<button type="button" class="btn btn-primary rounded-circle shadow-lg" 
        onclick="abrirModalIA()" 
        style="position: fixed; bottom: 20px; right: 20px; z-index: 1000; width: 60px; height: 60px;">
    <i class="fa-solid fa-robot"></i>
</button>

<div class="modal" id="modalIA" style="display: none; background: rgba(0,0,0,0.5); align-items: center; justify-content: center;">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white border-info">
            <div class="modal-header border-secondary">
                <h5 class="modal-title"><i class="fa-solid fa-ghost"></i> Luna - Asistente BEDCOM</h5>
                <button type="button" class="btn-close btn-close-white" onclick="cerrarModalIA()"></button>
            </div>
            
            <div class="modal-body">
                <div id="chatContainer" style="height: 350px; overflow-y: auto; background: #0f172a; border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155;">
                    <div style="color: #38bdf8; margin-bottom: 10px;">
                        <strong>Luna:</strong> ¡Hola! Soy Luna, tu asistente virtual de BEDCOM. ¿En qué puedo ayudarte hoy?
                    </div>
                </div>

                <div class="input-group">
                    <button id="btnVoz" class="btn btn-outline-info" onclick="escucharVoz()" title="Hablar">
                        <i class="fa-solid fa-microphone"></i>
                    </button>

                    <input type="text" id="iaQuery" class="form-control bg-secondary text-white border-0" 
                           placeholder="Pregúntame algo..." autocomplete="off">

                    <button id="btnPreguntarIA" class="btn btn-info" onclick="enviarConsultaIA()">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
