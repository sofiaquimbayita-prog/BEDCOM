{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }}</title>
    <style>
        /* ====== ESTILOS GENERALES DEL DOCUMENTO PDF ====== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 11px;
            color: #2c3e50;
            background-color: #ffffff;
            line-height: 1.5;
        }

        /* ====== ESTILOS DE LA PAGINA ====== */
        @page {
            size: A4;
            margin: 1.2cm;
            @bottom-center {
                content: "Página " counter(page) " de " counter(pages);
                font-size: 9px;
                color: #95a5a6;
                font-family: 'Segoe UI', sans-serif;
            }
        }

        /* ====== LOGO ====== */
        .icono-container {
            text-align: center;
            margin-bottom: 12px;
        }

        .icono {
            width: 100px;
            height: auto;
            object-fit: contain;
        }

        .icono-img {
            height: 55px;
            width: auto;
        }

        /* ====== ENCABEZADO DEL REPORTE ====== */
        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 3px solid #51a3d3;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .header .subtitle {
            font-size: 13px;
            color: #51a3d3;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header .date {
            font-size: 10px;
            color: #7f8c8d;
            margin-top: 4px;
        }

        /* ====== TABLA DE DATOS ====== */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin-top: 16px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 16px;
            min-width: 100%;
            word-break: break-word;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        thead {
            background: linear-gradient(135deg, #4472C4, #4b89d4);
            color: white;
        }

        thead th {
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border: none;
        }

        tbody td {
            padding: 8px 12px;
            border-bottom: 1px solid #e9ecef;
            font-size: 10px;
            color: #34495e;
        }

        /* ====== FILAS CON COLOR DE FONDO PARA MEJOR LEGIBILIDAD ====== */
        tbody tr:nth-child(odd) {
            background-color: #f8f9fa;
        }

        tbody tr:nth-child(even) {
            background-color: #ffffff;
        }

        tbody tr:hover {
            background-color: #e3f2fd;
        }

        /* ====== FILA DE TOTALES ====== */
        tbody tr:last-child {
            background-color: #e8e8e8;
            font-weight: 600;
        }

        /* ====== PIE DE PAGINA ====== */
        .footer {
            margin-top: 24px;
            padding-top: 14px;
            border-top: 2px solid #e9ecef;
            text-align: center;
        }

        .footer .summary {
            margin-bottom: 10px;
            font-size: 11px;
            color: #2c3e50;
        }

        .footer .legal {
            font-size: 9px;
            color: #95a5a6;
            line-height: 1.6;
        }

        /* ====== INFORMACIÓN EXTRA ====== */
        .info-extra {
            margin-top: 12px;
            text-align: center;
            font-size: 9px;
            color: #bdc3c7;
        }

        /* ====== BADGES ====== */
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 600;
        }

        .badge-success {
            background-color: #d4edda;
            color: #155724;
        }

        .badge-danger {
            background-color: #f8d7da;
            color: #721c24;
        }

        .badge-info {
            background-color: #d1ecf1;
            color: #0c5460;
        }

        .badge-warning {
            background-color: #fff3cd;
            color: #856404;
        }
    </style>
</head>
