<!-- Modal Ver -->
<div id="modalView" class="modal" style="display: none;">
    <div class="modal-content modal-contenido--wide">
        <div class="modal-header">
            <h2><i class="fas fa-user"></i> Detalles del Proveedor</h2>
            <button type="button" class="close-modal" onclick="cerrarModal('modalView')">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <div style="text-align:center;margin-bottom:16px;">
                <img id="viewImagen" src="" alt="Imagen del proveedor" style="width:100px;height:100px;object-fit:cover;border-radius:50%;border:3px solid var(--color-primario);">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div class="view-info">
                    <label>Nombre</label>
                    <p id="viewNombre"></p>
                </div>
                <div class="view-info">
                    <label>Teléfono</label>
                    <p id="viewTelefono"></p>
                </div>
                <div class="view-info">
                    <label>Dirección</label>
                    <p id="viewDireccion"></p>
                </div>
                <div class="view-info">
                    <label>Descripción</label>
                    <p id="viewDescripcion"></p>
                </div>
            </div>

            <hr style="border:0;border-top:1px solid var(--color-borde);margin:16px 0;">

            <h3 style="margin:0 0 10px;font-size:15px;color:var(--color-primario);">
                <i class="fas fa-boxes"></i> Insumos (<span id="totalInsumos">0</span>)
            </h3>
            <div style="max-height:260px;overflow-y:auto;border:1px solid var(--color-borde);border-radius:8px;">
                <table class="items-tabla" style="width:100%;">
                    <thead>
                        <tr>
                            <th>Insumo</th>
                            <th>Categoría</th>
                            <th>Cant.</th>
                            <th>U. Medida</th>
                            <th>Precio</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="insumosBody">
                        <tr><td colspan="6" style="text-align:center;color:var(--color-texto-muted);padding:20px;">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="modal-footer">
            <button type="button" class="btn-cancel" onclick="cerrarModal('modalView')">Cerrar</button>
        </div>
    </div>
</div>
