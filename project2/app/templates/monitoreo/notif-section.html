<div id="notificaciones-section" class="panel notif-panel">
    <div class="panel-header">
        <span class="panel-title"><i class="fas fa-bell"></i> Notificaciones (<span id="notif-total-count">0</span>)</span>
        <div class="panel-actions">
            <button onclick="checkTriggersNow()" class="btn-check-now" title="Verificar triggers ahora">
                <i class="fas fa-bolt"></i> Verificar Ahora
            </button>
            <span id="check-status" class="status-ok"></span>
        </div>
    </div>
    
    <!-- VISTA AGRUPADA (Anti-spam) -->
    <div id="notif-grouped-view" class="notif-grouped-container">
        <div class="notif-loading">
            <i class="fas fa-spinner fa-spin"></i> Cargando notificaciones...
        </div>
    </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   NOTIF-SECTION: Vista de monitoreo
   NO tiene polling propio. Consume datos del sistema global BedcomNotifs.
   ═══════════════════════════════════════════════════════════════════ */

// ── CSRF Helper ──────────────────────────────────────────────────
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

// ── Cargar vista agrupada ────────────────────────────────────────
function cargarNotifAgrupadas() {
    fetch('/vistas/monitoreo/api/notificaciones-agrupadas/')
        .then(res => res.json())
        .then(data => {
            if (!data.success) return;
            
            // Actualizar contador del panel
            const countEl = document.getElementById('notif-total-count');
            if (countEl) countEl.textContent = data.total || 0;
            
            const container = document.getElementById('notif-grouped-view');
            if (!container) return;
            
            const grupos = data.grupos || [];
            
            if (grupos.length === 0) {
                container.innerHTML = `
                    <div class="notif-empty-state">
                        <i class="fas fa-check-circle"></i>
                        <p>Sin notificaciones activas</p>
                        <span>El sistema está funcionando correctamente</span>
                    </div>
                `;
                return;
            }
            
            let html = '';
            grupos.forEach((grupo, idx) => {
                const isExpanded = grupo.no_leidas > 0; // Auto-expandir si hay no leídas
                const badgeClass = grupo.no_leidas > 0 ? 'badge-unread' : 'badge-read';
                
                html += `
                <div class="notif-group ${isExpanded ? 'expanded' : ''}" data-tipo="${grupo.tipo}">
                    <div class="notif-group-header" onclick="toggleNotifGroup(this)" style="--group-color: ${grupo.color}">
                        <div class="notif-group-left">
                            <i class="${grupo.icon}" style="color: ${grupo.color}"></i>
                            <span class="notif-group-title">${grupo.titulo_grupo}</span>
                            <span class="notif-group-badge ${badgeClass}">${grupo.cantidad}</span>
                            ${grupo.no_leidas > 0 ? `<span class="notif-group-unread">${grupo.no_leidas} nuevas</span>` : ''}
                        </div>
                        <div class="notif-group-right">
                            <button class="btn-mark-group" onclick="event.stopPropagation(); markGroupRead('${grupo.tipo}')" title="Marcar todas como leídas" ${grupo.no_leidas === 0 ? 'disabled' : ''}>
                                <i class="fas fa-check-double"></i>
                            </button>
                            <i class="fas fa-chevron-down notif-group-arrow"></i>
                        </div>
                    </div>
                    <div class="notif-group-body">
                        <ul class="notif-group-items">`;
                
                grupo.items.forEach(item => {
                    const readClass = item.leida ? 'leida' : 'no-leida';
                    const fecha = new Date(item.fecha_notif).toLocaleString('es-CO', {
                        day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
                    });
                    
                    html += `
                            <li class="notif-group-item ${readClass}">
                                <div class="notif-item-content">
                                    <span class="notif-item-dot ${readClass}"></span>
                                    <div class="notif-item-text">
                                        <span class="notif-item-titulo">${item.titulo}</span>
                                        <span class="notif-item-fecha">${fecha}</span>
                                    </div>
                                </div>
                                <div class="notif-item-actions">
                                    ${!item.leida ? `
                                    <button class="btn-small-notif" onclick="markSingleRead(${item.id})" title="Marcar como leída">
                                        <i class="fas fa-eye"></i>
                                    </button>` : `
                                    <span class="notif-read-badge"><i class="fas fa-check"></i> Leída</span>`}
                                    <button class="btn-small-notif action" onclick="redirigirNotif('${grupo.tipo}')" title="Ir al módulo">
                                        <i class="fas fa-external-link-alt"></i>
                                    </button>
                                </div>
                            </li>`;
                });
                
                html += `
                        </ul>
                    </div>
                </div>`;
            });
            
            container.innerHTML = html;
        })
        .catch(err => {
            console.error('Error cargando notifs agrupadas:', err);
        });
}

// ── Toggle grupo acordeón ────────────────────────────────────────
function toggleNotifGroup(headerEl) {
    const group = headerEl.closest('.notif-group');
    if (group) group.classList.toggle('expanded');
}

// ── Marcar individual como leída ─────────────────────────────────
function markSingleRead(id) {
    fetch(`/vistas/monitoreo/api/notif-read/${id}/`, {
        method: 'POST',
        headers: { 'X-CSRFToken': getCookie('csrftoken') }
    })
    .then(() => {
        cargarNotifAgrupadas();
        // Forzar actualización del badge global
        if (window.BedcomNotifs) window.BedcomNotifs.forceCheck();
    })
    .catch(err => console.error('Mark read error:', err));
}

// ── Marcar grupo completo como leído ─────────────────────────────
function markGroupRead(tipo) {
    fetch(`/vistas/monitoreo/api/notif-group-read/${tipo}/`, {
        method: 'POST',
        headers: { 'X-CSRFToken': getCookie('csrftoken') }
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            window.showToast(`✅ ${data.marcadas} notificaciones marcadas como leídas`);
            cargarNotifAgrupadas();
            if (window.BedcomNotifs) window.BedcomNotifs.forceCheck();
        }
    })
    .catch(err => console.error('Mark group read error:', err));
}

// ── Verificar triggers manualmente (botón fallback) ──────────────
function checkTriggersNow() {
    const statusEl = document.getElementById('check-status');
    if (statusEl) {
        statusEl.textContent = 'Verificando...';
        statusEl.className = 'status-loading';
    }
    
    // Usar el sistema centralizado
    if (window.BedcomNotifs) {
        window.BedcomNotifs.forceCheck();
    }
    
    // Esperar un momento y recargar la vista agrupada
    setTimeout(() => {
        cargarNotifAgrupadas();
        if (statusEl) {
            statusEl.textContent = '✓ Actualizado';
            statusEl.className = 'status-ok';
            setTimeout(() => { 
                statusEl.textContent = ''; 
            }, 3000);
        }
    }, 1500);
}

// ── Redirigir al módulo correspondiente ──────────────────────────
function redirigirNotif(tipo) {
    let urlDestino = '/vistas/monitoreo/';
    switch(tipo) {
        case 'bajo_stock_insumo': urlDestino = '/vistas/insumos/'; break;
        case 'bajo_stock_producto': urlDestino = '/vistas/productos/'; break;
        case 'calendario_hoy':
        case 'calendario_manaña': urlDestino = '/vistas/calendario/'; break;
        case 'pendido_despacho': urlDestino = '/vistas/despacho/'; break;
        case 'sin_bom': urlDestino = '/vistas/bom/'; break;
        case 'pago_pendiente': urlDestino = '/vistas/pedido/'; break;
        case 'mantenimiento_nueva': urlDestino = '/vistas/mantenimientos/'; break;
        case 'reporte_generado': urlDestino = '/vistas/reportes/'; break;
    }
    window.location.href = urlDestino;
}

// ── INICIALIZACIÓN ───────────────────────────────────────────────
// Cargar vista agrupada al inicio
setTimeout(() => {
    cargarNotifAgrupadas();
}, 600);

// Escuchar actualizaciones del sistema global (sin polling propio)
if (window.BedcomNotifs) {
    window.BedcomNotifs.onUpdate(function(data) {
        // Cuando el sistema global detecta cambios, refrescar vista agrupada
        cargarNotifAgrupadas();
    });
}
</script>
