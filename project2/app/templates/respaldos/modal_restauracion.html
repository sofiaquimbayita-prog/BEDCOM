<div class="modal-header position-relative">
    <h3 class="mb-0" style="padding-right: 45px;">
        <i class="fas fa-database me-2" style="vertical-align: middle;"></i>
        Restauracion de Base de Datos
    </h3>
    <span class="close position-absolute" onclick="cerrarModal('modal_restauracion')" style="top: 12px; right: 15px; font-size: 1.6rem; line-height: 1; cursor: pointer; z-index: 10;">&times;</span>
</div>

<div class="container-fluid p-4">
    <div class="stats-container">

        <!-- ESTADO -->
        <div class="stat-card purple">
            <span class="stat-label">ESTADO DE CONEXION</span>

            {% if mysql_conectado %}
                <span class="stat-value text-success">Conectado</span>
            {% else %}
                <span class="stat-value text-danger">Desconectado</span>
            {% endif %}
        </div>



        <!-- RESTAURAR -->
        <div class="stat-card green">
            <span class="stat-label">RESTAURAR BD</span>

            {% if mysql_conectado %}
            <div id="zona-carga" class="zona-carga-mini">
                <input type="file" id="archivo-respaldo" accept=".sql">
                <label for="archivo-respaldo" class="label-file-respaldo">
                    <i class="bi bi-cloud-arrow-up-fill" aria-hidden="true"></i>
                    <span class="file-title">Haz clic para seleccionar tu respaldo</span>
                    <small class="file-subtitle">o arrastra aqui un archivo .sql</small>
                    <span class="file-action">Explorar archivo SQL</span>
                </label>
                <small class="file-selected" id="archivo-respaldo-nombre">Ningun archivo seleccionado</small>

                <div id="restauracion-estado" class="restauracion-estado" aria-live="polite" hidden>
                    <div class="restauracion-estado-header">
                        <span class="restauracion-estado-titulo">
                            <i class="fas fa-rotate-right fa-spin"></i>
                            Restaurando respaldo
                        </span>
                        <span class="restauracion-estado-porcentaje" id="restauracion-porcentaje">0%</span>
                    </div>

                    <div class="restauracion-progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-labelledby="restauracion-detalle">
                        <div id="restauracion-progress-bar" class="restauracion-progress-bar"></div>
                    </div>

                    <small id="restauracion-detalle" class="restauracion-detalle">
                        Esperando archivo para iniciar la restauracion.
                    </small>
                </div>
            </div>
            {% endif %}
        </div>

    </div>
</div>
