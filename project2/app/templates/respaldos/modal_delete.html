<div class="modal-header">
    <h3><i class="fas fa-exclamation-triangle"></i> ¿Inactivar Respaldo?</h3>
    <span class="close" onclick="cerrarModal('deleteModal')">&times;</span>
</div>

<div class="delete-container">
    <p>Estás a punto de inactivar el respaldo del día: <strong id="deleteRespaldoDate"></strong></p>
    <p class="warning-text">
        <i class="fas fa-info-circle"></i>
        Esta acción se puede deshacer. El respaldo aparecerá como inactivo.
    </p>
    
    <form id="deleteForm" method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn-delete">
                <i class="fas fa-trash-alt"></i> Confirmar Inactivación
            </button>
            <button type="button" class="btn-cancel" onclick="cerrarModal('deleteModal')">
                No, mantenerlo
            </button>
        </div>
    </form>
</div>
