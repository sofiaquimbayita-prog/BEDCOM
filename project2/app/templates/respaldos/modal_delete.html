<form id="deleteForm" method="POST">
    {% csrf_token %}
    <div class="modal-header">
        <h3><i class="fas fa-trash"></i> ¿Inactivar Respaldo?</h3>
        <span class="close" onclick="cerrarModal('deleteModal')">&times;</span>
    </div>

    <div class="delete-container">
        <p>¿Seguro que deseas inactivar?</p>

        <div class="form-actions">
            <button type="submit" class="btn-delete"><i class="fas fa-trash-alt"></i> Confirmar</button>
            <button type="button" class="btn-cancel" onclick="cerrarModal('deleteModal')"><i class="fas fa-times"></i> Cancelar</button>
        </div>
    </div>
</form>
