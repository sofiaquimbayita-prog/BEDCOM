<div class="modal-header">
    <h3 class="modal-title-custom">
        <i class="fas fa-cloud-upload-alt"></i> Generar Nuevo Respaldo
    </h3>
    <span class="close" onclick="cerrarModal('generarModal')">&times;</span>
</div>

<div class="modal-body custom-modal-body">

<form id="generarRespaldoForm" method="post" action="{% url 'generar_respaldo' %}">
{% csrf_token %}

<input type="hidden" id="add_tipo" name="tipo_respaldo">

<div class="tipo-respaldo-container">

<div class="tipo-card" data-value="completo">
    <div class="tipo-icon blue"><i class="fas fa-database"></i></div>
    <div class="tipo-info">
        <strong>Respaldo Completo</strong>
        <p>Todo el sistema</p>
    </div>
    <div class="tipo-radio"></div>
</div>

<div class="tipo-card" data-value="parcial">
    <div class="tipo-icon yellow"><i class="fas fa-cubes"></i></div>
    <div class="tipo-info">
        <strong>Respaldo Parcial</strong>
        <p>Módulos específicos</p>
    </div>
    <div class="tipo-radio"></div>
</div>

</div>

<div id="modulosContainer" class="modulos-container">

<div class="modulo-card">
    <div class="modulo-icon blue"><i class="fas fa-box"></i></div>
    <div class="modulo-info">
        <strong>Productos</strong>
        <p>Catálogo</p>
    </div>
    <input type="checkbox" name="modulos[]" value="productos">
</div>

</div>

<div class="form-actions">
    <button type="submit" class="btn-save">Iniciar Respaldo</button>
    <button type="button" class="btn-cancel" onclick="cerrarModal('generarModal')">Cancelar</button>
</div>

</form>
</div>
