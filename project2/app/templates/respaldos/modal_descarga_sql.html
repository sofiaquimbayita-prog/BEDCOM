<div class="modal-header position-relative">
    <h3 class="mb-0" style="padding-right: 45px;">
        <i class="fas fa-file-download me-2" style="vertical-align: middle;"></i>
        Descargar Respaldo SQL
    </h3>
    <span class="close position-absolute" onclick="cerrarModal('modalDescargaSQL')" style="top: 12px; right: 15px; font-size: 1.6rem; line-height: 1; cursor: pointer; z-index: 10;">&times;</span>
</div>

<div class="container-fluid p-4">
    <div class="stats-container">
        <!-- DESCARGAR RESPALDO (extraída del modal original) -->
        <div class="stat-card blue">
            <span class="stat-label">DESCARGAR RESPALDO SQL</span>
            <span class="stat-value small">Backup completo de la base de datos</span>

            {% if mysql_conectado %}
            <form method="post" action="{% url 'respaldos_list' %}" id="backupSqlForm">
                {% csrf_token %}
                <input type="hidden" name="accion" value="backup_completo">
                <button type="submit" class="stat-btn" id="backupSqlSubmitBtn">
                    <i class="fas fa-file-download me-1"></i> Descargar SQL
                </button>
            </form>
            {% else %}
            <div class="stat-no-connected">
                <small class="text-muted">Conecta MySQL para generar respaldo</small>
            </div>
            {% endif %}
        </div>
    </div>
</div>
