<!-- Modal de Ver Detalles de Salida -->
<div id="modalVerSalida" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 500px;">
        <div class="modal-header" style="background: #17a2b8;">
            <h2 style="color: white;"><i class="fas fa-eye"></i> Detalle de Salida</h2>
            <button type="button" class="close-modal" onclick="cerrarModalVerSalida()" style="color: white;">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body" style="padding: 20px;">
            <div class="detail-row">
                <label><i class="fas fa-box"></i> Producto:</label>
                <span id="verProducto">--</span>
            </div>
            <div class="detail-row">
                <label><i class="fas fa-sort-numeric-up"></i> Cantidad:</label>
                <span id="verCantidad" style="color: #38bdf8; font-weight: bold;">--</span>
            </div>
            <div class="detail-row">
                <label><i class="fas fa-calendar"></i> Fecha:</label>
                <span id="verFecha">--</span>
            </div>
            <div class="detail-row">
                <label><i class="fas fa-align-left"></i> Motivo:</label>
                <span id="verMotivo">--</span>
            </div>
            <div class="detail-row">
                <label><i class="fas fa-user"></i> Responsable:</label>
                <span id="verResponsable">--</span>
            </div>
            <div class="detail-row">
                <label><i class="fas fa-toggle-on"></i> Estado:</label>
                <span id="verEstado">--</span>
            </div>
        </div>
        <div class="modal-footer" style="justify-content: center;">
            <button type="button" class="btn-cancel" onclick="cerrarModalVerSalida()">
                <i class="fas fa-times"></i> Cerrar
            </button>
        </div>
    </div>
</div>

<script>
// Función para abrir el modal de ver detalles
function verDetalleSalida(id) {
    console.log('Obteniendo detalles de salida ID:', id);
    
    // Obtener los detalles de la salida
    fetch('/vistas/salida/detalle/' + id + '/', {
        method: 'GET',
        headers: {
            'X-Requested-With': 'XMLHttpRequest',
        }
    })
    .then(function(response) {
        return response.json();
    })
    .then(function(data) {
        if (data.success) {
            // Llenar los datos en el modal
            var productoElem = document.getElementById('verProducto');
            var cantidadElem = document.getElementById('verCantidad');
            var fechaElem = document.getElementById('verFecha');
            var motivoElem = document.getElementById('verMotivo');
            var responsableElem = document.getElementById('verResponsable');
            var estadoElem = document.getElementById('verEstado');
            
            if (productoElem) productoElem.textContent = data.data.producto;
            if (cantidadElem) cantidadElem.textContent = data.data.cantidad;
            if (fechaElem) fechaElem.textContent = data.data.fecha;
            if (motivoElem) motivoElem.textContent = data.data.motivo;
            if (responsableElem) responsableElem.textContent = data.data.responsable;
            
            if (estadoElem) {
                estadoElem.textContent = data.data.estado;
                if (data.data.estado === 'Anulada') {
                    estadoElem.style.color = '#dc3545';
                    estadoElem.style.fontWeight = 'bold';
                } else {
                    estadoElem.style.color = '#28a745';
                    estadoElem.style.fontWeight = 'bold';
                }
            }
            
            // Abrir el modal
            var modal = document.getElementById('modalVerSalida');
            if (modal) {
                modal.style.display = 'flex';
            }
        } else {
            showErrorToast(data.message || 'Error al obtener los detalles');
        }
    })
    .catch(function(error) {
        console.error('Error:', error);
        showErrorToast('Ocurrió un error al procesar la solicitud');
    });
}

// Función para cerrar el modal de ver detalles
function cerrarModalVerSalida() {
    var modal = document.getElementById('modalVerSalida');
    if (modal) {
        modal.style.display = 'none';
    }
}

// Funciones globales
window.verDetalleSalida = verDetalleSalida;
window.cerrarModalVerSalida = cerrarModalVerSalida;
</script>

<style>
.detail-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid #e0e0e0;
}
.detail-row:last-child {
    border-bottom: none;
}
.detail-row label {
    font-weight: 600;
    color: #555;
    display: flex;
    align-items: center;
    gap: 8px;
}
.detail-row span {
    color: #333;
    text-align: right;
    max-width: 60%;
    word-wrap: break-word;
}
</style>
