{% load static %}
<div class="modal-content modal-delete">
    <div class="modal-header modal-header-delete">
        <h2><i class="fas fa-redo"></i> Reactivar Entrada</h2>
        <button type="button" class="modal-close" onclick="cerrarModal('modalReactivate')">
            <i class="fas fa-times"></i>
        </button>
    </div>
    
    <div class="modal-body-delete">
        <div class="delete-icon" style="background-color: #22c55e;">
            <i class="fas fa-redo"></i>
        </div>
        <h3>¿Está seguro de reactivar esta entrada?</h3>
        <div class="entrada-nombre" id="reactivate_entrada_nombre">
            Producto: --
        </div>
        <p class="advertencia">
            <i class="fas fa-info-circle"></i> La entrada volverá a estar activa y será visible en la tabla principal.
        </p>
    </div>
    
    <form id="formReactivarEntrada">
        {% csrf_token %}
        <input type="hidden" id="reactivate_entrada_id" name="id">
        
        <div class="modal-footer-delete">
            <button type="button" class="btn-cancel" onclick="cerrarModal('modalReactivate')">
                <i class="fas fa-times"></i> Cancelar
            </button>
            <button type="button" class="btn-delete" style="background-color: #22c55e;">
                <i class="fas fa-redo"></i> Reactivar
            </button>
        </div>
    </form>
</div>
