
{% load static %}
<div class="modal-content" style="max-width: 600px !important; max-height: 90vh; overflow-y: auto;">
    <div class="modal-header" style="padding: 18px 22px !important;">
        <h2 style="font-size: 1.1rem !important;"><i class="fas fa-plus-circle"></i> Nueva Entrada</h2>
        <button type="button" class="modal-close" onclick="cerrarModal('modalAdd')">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <form id="formAgregarEntrada" style="padding: 0 22px 22px !important;">
        {% csrf_token %}

        <div class="form-group" style="margin-bottom: 16px;">
            <label for="producto" style="font-size: 0.8rem !important; margin-bottom: 5px !important;">Producto *</label>
            <select id="producto" name="producto" class="form-control" onchange="mostrarBOMyStock(); mostrarStockActual(); validarCamposBasicos();" style="padding: 10px 12px !important;">
                <option value="">Seleccionar...</option>
                {% for p in productos %}
                <option value="{{ p.id }}" data-stock="{{ p.stock }}">{{ p.nombre }}</option>
                {% endfor %}
            </select>
            <div class="error-message" id="error-producto"></div>
        </div>

        <div class="stock-info-box" style="padding: 12px 15px !important; margin-bottom: 16px !important;">
            <i class="fas fa-boxes" style="font-size: 1.1rem !important; margin-right: 8px !important;"></i>
            <span style="font-size: 0.85rem;">Stock: <strong id="stock-actual" style="color: #38bdf8;">0</strong></span>
            <span style="margin: 0 10px; color: #64748b;">→</span>
            <span style="font-size: 0.85rem;">Nuevo: <strong id="nuevo-stock" style="color: #22c55e;">0</strong></span>
        </div>

        <div class="form-row" style="gap: 12px;">
            <div class="form-group" style="flex: 1; margin-bottom: 16px;">
                <label for="cantidad" style="font-size: 0.8rem !important; margin-bottom: 5px !important;">Cantidad *</label>
                <input type="number" id="cantidad" name="cantidad" class="form-control" min="1" oninput="calcularNuevoStock(); actualizarBOM(); validarCamposBasicos();" style="padding: 10px 12px !important;">
                <div class="error-message" id="error-cantidad"></div>
            </div>
            <div class="form-group" style="flex: 1; margin-bottom: 16px;">
                <label for="precio_unitario" style="font-size: 0.8rem !important; margin-bottom: 5px !important;">Precio Unit. *</label>
                <input type="number" id="precio_unitario" name="precio_unitario" class="form-control" min="0" step="0.01" oninput="calcularTotal(); validarCamposBasicos();" style="padding: 10px 12px !important;">
                <div class="error-message" id="error-precio_unitario"></div>
            </div>
        </div>

        <!-- BOM INSUMOS SECTION -->
        <div id="bom-section" style="display: none; margin-bottom: 16px;">
            <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 8px; padding: 15px;">
                <h4 style="margin: 0 0 12px 0; color: #059669; font-size: 0.95rem;"><i class="fas fa-cogs"></i> Insumos requeridos (BOM)</h4>
                <div style="max-height: 200px; overflow-y: auto;">
                    <table style="width: 100%; font-size: 0.8rem; border-collapse: collapse;">
                        <thead style="background: rgba(16, 185, 129, 0.2);">
                            <tr>
                                <th style="padding: 8px 4px; text-align: left; border-bottom: 1px solid rgba(16, 185, 129, 0.3);">Insumo</th>
                                <th style="padding: 8px 4px; text-align: right; border-bottom: 1px solid rgba(16, 185, 129, 0.3);">Requerido</th>
                                <th style="padding: 8px 4px; text-align: right; border-bottom: 1px solid rgba(16, 185, 129, 0.3);">Disponible</th>
                                <th style="padding: 8px 4px; text-align: center; border-bottom: 1px solid rgba(16, 185, 129, 0.3);">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="bom-tbody">
                        </tbody>
                    </table>
                </div>
                <div id="bom-status" style="margin-top: 8px; font-size: 0.8rem;"></div>
            </div>
        </div>

        <div style="background: rgba(14, 165, 233, 0.1); border: 1px solid rgba(14, 165, 233, 0.25); border-radius: 8px; padding: 12px 15px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;">
            <span style="color: #94a3b8; font-size: 0.85rem;"><i class="fas fa-calculator" style="margin-right: 6px;"></i>Total</span>
            <span id="total" style="font-size: 1.3rem; font-weight: bold; color: #0ea5e9;">$0.00</span>
        </div>

        <div class="form-group" style="margin-bottom: 16px;">
            <label for="observaciones" style="font-size: 0.8rem !important; margin-bottom: 5px !important;">Observaciones</label>
            <textarea id="observaciones" name="observaciones" rows="2" placeholder="Opcional" style="padding: 10px 12px !important; resize: none;"></textarea>
            <div class="error-message" id="error-observaciones"></div>
        </div>
    </form>

    <div class="modal-footer" style="padding: 15px 22px !important; gap: 10px;">
        <button type="button" class="btn-cancel" onclick="cerrarModal('modalAdd')" style="padding: 10px 18px !important; font-size: 0.85rem !important;">
            <i class="fas fa-times"></i> Cancelar
        </button>
        <button type="submit" id="btn-guardar" class="btn-save" form="formAgregarEntrada" style="padding: 10px 18px !important; font-size: 0.85rem !important;">
            <i class="fas fa-save"></i> Guardar
        </button>
    </div>
</div>

<style>
    .form-group input.error, .form-group select.error, .form-group textarea.error {
        border-color: #ef4444 !important;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2) !important;
    }
    .form-group input.valid, .form-group select.valid, .form-group textarea.valid {
        border-color: #22c55e !important;
        box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2) !important;
    }
    .error-message { color: #ef4444; font-size: 0.75rem; margin-top: 4px; display: none; }
    .error-message.show { display: block; }
    
    .bom-row-ok { background: rgba(34, 197, 94, 0.1); }
    .bom-row-warning { background: rgba(245, 158, 11, 0.2); }
    .status-ok { color: #22c55e; font-weight: bold; }
    .status-warning { color: #f59e0b; font-weight: bold; }
    #btn-guardar:not(:disabled) { cursor: pointer; }
</style>

<script>
    let bomData = [];

    // Fix functions
    function mostrarErrorCampo(campoId, mensaje) {
        const campo = document.getElementById(campoId);
        const errorDiv = document.getElementById('error-' + campoId);
        if (campo) campo.classList.add('error');
        if (errorDiv) {
            errorDiv.textContent = mensaje;
            errorDiv.classList.add('show');
        }
    }

    function mostrarValidCampo(campoId) {
        const campo = document.getElementById(campoId);
        const errorDiv = document.getElementById('error-' + campoId);
        if (campo) campo.classList.remove('error');
        if (errorDiv) {
            errorDiv.textContent = '';
            errorDiv.classList.remove('show');
        }
    }

    function limpiarErrores() {
        ['producto', 'cantidad', 'precio_unitario', 'observaciones'].forEach(campoId => {
            mostrarValidCampo(campoId);
        });
    }

    function validarCampo(campoId, valor) {
        const cantidad = parseInt(valor);
        if (campoId === 'cantidad') {
            if (!valor || cantidad <= 0) {
                mostrarErrorCampo('cantidad', 'Cantidad > 0');
                return false;
            }
            mostrarValidCampo('cantidad');
            return true;
        }
        return true;
    }

    function calcularTotal() {
        const cantidad = parseInt(document.getElementById('cantidad').value) || 0;
        const precio = parseFloat(document.getElementById('precio_unitario').value) || 0;
        document.getElementById('total').textContent = '$' + (cantidad * precio).toLocaleString('es-CO', {minimumFractionDigits: 2});
    }

    function calcularNuevoStock() {
        const select = document.getElementById('producto');
        const cantidad = document.getElementById('cantidad');
        const nuevoStock = document.getElementById('nuevo-stock');
        if (select && cantidad && nuevoStock) {
            const stock = parseInt(select.selectedOptions[0].dataset.stock) || 0;
            nuevoStock.textContent = stock + (parseInt(cantidad.value) || 0);
        }
        actualizarBOM();
        calcularTotal();
    }

    function mostrarStockActual() {
        const select = document.getElementById('producto');
        const stockActual = document.getElementById('stock-actual');
        if (select && stockActual) {
            stockActual.textContent = select.selectedOptions[0].dataset.stock || 0;
        }
        calcularNuevoStock();
    }

    function mostrarBOMyStock() {
        mostrarStockActual();
        cargarBOM();
    }

    // BOM functions - SIMPLE HTML table, NO DataTables
    function cargarBOM() {
        const productoId = document.getElementById('producto').value;
        const bomSection = document.getElementById('bom-section');
        if (!productoId || !bomSection) return;

        fetch(`/vistas/bom/por-producto/?producto_id=${productoId}`)
            .then(res => res.json())
            .then(data => {
                bomData = data;
                bomSection.style.display = data.length ? 'block' : 'none';
                actualizarBOM();
            }).catch(() => bomSection.style.display = 'none');
    }

    function actualizarBOM() {
        const cantidad = parseInt(document.getElementById('cantidad').value) || 0;
        const tbody = document.getElementById('bom-tbody');
        const status = document.getElementById('bom-status');
        const btnGuardar = document.getElementById('btn-guardar');
        let ok = true; // SIEMPRE OK - permitir guardar
        let html = '';

        if (!bomData.length) return;

        bomData.forEach(item => {
            const requerida = item.cantidad * cantidad;
            const disponible = item.insumo_stock || 0;
            const suficiente = disponible >= requerida;
            ok &= suficiente;

            html += `<tr class="${suficiente ? 'bom-row-ok' : 'bom-row-warning'}">
                <td>${item.insumo_nombre}</td>
                <td style="text-align: right;">${requerida.toLocaleString()}</td>
                <td style="text-align: right; color: #38bdf8;">${disponible.toLocaleString()}</td>
                <td style="text-align: center;"><span class="status-${suficiente ? 'ok' : 'warning'}">${suficiente ? 'OK' : 'INSUFICIENTE'}</span></td>
            </tr>`;
        });

        tbody.innerHTML = html;
        status.innerHTML = ok ? 
            '<span style="color: #22c55e;"><i class="fas fa-check-circle"></i> Todos OK</span>' : 
            '<span style="color: #f59e0b;"><i class="fas fa-exclamation-triangle"></i> Insuficientes</span>';

        // BOM solo informativo, botón habilitado por validarCamposBasicos()
    }

    // Validación básica para habilitar botón cuando campos requeridos llenos
    function validarCamposBasicos() {
        const productoEl = document.getElementById('producto');
        const cantidadEl = document.getElementById('cantidad');
        const precioEl = document.getElementById('precio_unitario');
        const btnGuardar = document.getElementById('btn-guardar');

        if (!productoEl || !cantidadEl || !precioEl || !btnGuardar) return;

        const producto = productoEl.value;
        const cantidad = cantidadEl.value;
        const precio = precioEl.value;

        const isValid = producto && cantidad && parseInt(cantidad) > 0 && precio && parseFloat(precio) >= 0;
        btnGuardar.disabled = !isValid;
        btnGuardar.style.opacity = isValid ? '1' : '0.6';
        btnGuardar.style.cursor = isValid ? 'pointer' : 'not-allowed';
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie) {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // Form submit
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('formAgregarEntrada');
        if (form) {
            // Inicializar validación
            validarCamposBasicos();
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const btn = document.getElementById('btn-guardar');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

                const formData = new FormData(form);
                formData.append('csrfmiddlewaretoken', getCookie('csrftoken'));

                fetch('/vistas/entrada_p/crear/', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        cerrarModal('modalAdd');
                        form.reset();
                        if (typeof recargarTabla === 'function') recargarTabla();
                        mostrarMensaje('success', data.message);
                    } else {
                        mostrarMensaje('error', data.message);
                    }
                })
                .catch(() => mostrarMensaje('error', 'Error'))
                .finally(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-save"></i> Guardar';
                });
            });
        }
    });
</script>
