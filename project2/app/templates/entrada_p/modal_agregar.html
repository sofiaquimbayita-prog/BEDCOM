{% load static %}
<div class="modal-content" style="max-width: 500px !important;">
    <div class="modal-header" style="padding: 18px 22px !important;">
        <h2 style="font-size: 1.1rem !important;"><i class="fas fa-plus-circle"></i> Nueva Entrada</h2>
        <button type="button" class="modal-close" onclick="cerrarModal('modalAdd')">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <form id="formAgregarEntrada" style="padding: 0 22px 22px !important;">
        {% csrf_token %}

        <div class="form-group" style="margin-bottom: 16px;">
            <label for="producto" style="font-size: 0.8rem !important; margin-bottom: 5px !important;">Producto *</label>
            <select id="producto" name="producto" required onchange="mostrarStockActual()" style="padding: 10px 12px !important;">
                <option value="">Seleccionar...</option>
                {% for p in productos %}
                <option value="{{ p.id }}" data-stock="{{ p.stock }}">{{ p.nombre }}</option>
                {% endfor %}
            </select>
            <div class="error-message" id="error-producto"></div>
        </div>

        <div class="stock-info-box" style="padding: 12px 15px !important; margin-bottom: 16px !important;">
            <i class="fas fa-boxes" style="font-size: 1.1rem !important; margin-right: 8px !important;"></i>
            <span style="font-size: 0.85rem;">Stock: <strong id="stock-actual" style="color: #38bdf8;">0</strong></span>
            <span style="margin: 0 10px; color: #64748b;">→</span>
            <span style="font-size: 0.85rem;">Nuevo: <strong id="nuevo-stock" style="color: #22c55e;">0</strong></span>
        </div>

        <div class="form-row" style="gap: 12px;">
            <div class="form-group" style="flex: 1; margin-bottom: 16px;">
                <label for="cantidad" style="font-size: 0.8rem !important; margin-bottom: 5px !important;">Cantidad *</label>
                <input type="number" id="cantidad" name="cantidad" min="1" placeholder="0" required oninput="calcularNuevoStock()" style="padding: 10px 12px !important;">
                <div class="error-message" id="error-cantidad"></div>
            </div>
            <div class="form-group" style="flex: 1; margin-bottom: 16px;">
                <label for="precio_unitario" style="font-size: 0.8rem !important; margin-bottom: 5px !important;">Precio *</label>
                <input type="number" id="precio_unitario" name="precio_unitario" min="0" step="0.01" placeholder="0.00" required oninput="calcularTotal()" style="padding: 10px 12px !important;">
                <div class="error-message" id="error-precio_unitario"></div>
            </div>
        </div>

        <div style="background: rgba(14, 165, 233, 0.1); border: 1px solid rgba(14, 165, 233, 0.25); border-radius: 8px; padding: 12px 15px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;">
            <span style="color: #94a3b8; font-size: 0.85rem;"><i class="fas fa-calculator" style="margin-right: 6px;"></i>Total</span>
            <span id="total" style="font-size: 1.3rem; font-weight: bold; color: #0ea5e9;">$0.00</span>
        </div>

        <div class="form-group" style="margin-bottom: 0;">
            <label for="observaciones" style="font-size: 0.8rem !important; margin-bottom: 5px !important;">Observaciones</label>
            <textarea id="observaciones" name="observaciones" rows="2" placeholder="Opcional" style="padding: 10px 12px !important; resize: none;"></textarea>
            <div class="error-message" id="error-observaciones"></div>
        </div>
    </form>

    <div class="modal-footer" style="padding: 15px 22px !important; gap: 10px;">
        <button type="button" class="btn-cancel" onclick="cerrarModal('modalAdd')" style="padding: 10px 18px !important; font-size: 0.85rem !important;">
            <i class="fas fa-times"></i> Cancelar
        </button>
        <button type="submit" class="btn-save" form="formAgregarEntrada" style="padding: 10px 18px !important; font-size: 0.85rem !important;">
            <i class="fas fa-save"></i> Guardar
        </button>
    </div>
</div>

<style>
    .form-group input.error, .form-group select.error, .form-group textarea.error {
        border-color: #ef4444 !important;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2) !important;
    }
    .form-group input.valid, .form-group select.valid, .form-group textarea.valid {
        border-color: #22c55e !important;
        box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2) !important;
    }
    .error-message { color: #ef4444; font-size: 0.75rem; margin-top: 4px; display: none; }
    .error-message.show { display: block; }
</style>

<script>
    function mostrarErrorCampo(campoId, mensaje) {
        const campo = document.getElementById(campoId);
        const errorDiv = document.getElementById('error-' + campoId);
        if (campo) { campo.classList.add('error'); campo.classList.remove('valid'); }
        if (errorDiv) { errorDiv.textContent = mensaje; errorDiv.classList.add('show'); }
    }

    function mostrarValidCampo(campoId) {
        const campo = document.getElementById(campoId);
        const errorDiv = document.getElementById('error-' + campoId);
        if (campo) { campo.classList.remove('error'); campo.classList.add('valid'); }
        if (errorDiv) { errorDiv.textContent = ''; errorDiv.classList.remove('show'); }
    }

    function limpiarErrores() {
        ['producto', 'cantidad', 'precio_unitario', 'observaciones'].forEach(function(campoId) {
            const campo = document.getElementById(campoId);
            const errorDiv = document.getElementById('error-' + campoId);
            if (campo) campo.classList.remove('error', 'valid');
            if (errorDiv) { errorDiv.textContent = ''; errorDiv.classList.remove('show'); }
        });
    }

    function validarCampo(campoId, valor) {
        if (campoId === 'cantidad') {
            const cantidad = parseInt(valor);
            if (!valor || cantidad <= 0) { mostrarErrorCampo('cantidad', 'La cantidad debe ser mayor a 0'); return false; }
            else if (cantidad > 10000) { mostrarErrorCampo('cantidad', 'La cantidad no puede superar 10,000'); return false; }
            else { mostrarValidCampo('cantidad'); return true; }
        }
        if (campoId === 'precio_unitario') {
            const precio = parseFloat(valor);
            if (!valor || precio <= 0) { mostrarErrorCampo('precio_unitario', 'El precio debe ser mayor a 0'); return false; }
            else if (precio > 10000000) { mostrarErrorCampo('precio_unitario', 'El precio no puede superar 10,000,000'); return false; }
            else if (valor.indexOf('.') !== -1 && valor.split('.')[1].length > 2) { mostrarErrorCampo('precio_unitario', 'Solo se permiten hasta 2 decimales'); return false; }
            else { mostrarValidCampo('precio_unitario'); return true; }
        }
        if (campoId === 'observaciones') {
            if (valor && valor.length > 500) { mostrarErrorCampo('observaciones', 'Las observaciones no pueden superar 500 caracteres'); return false; }
            else { mostrarValidCampo('observaciones'); return true; }
        }
        if (campoId === 'producto') {
            if (!valor) { mostrarErrorCampo('producto', 'Debe seleccionar un producto'); return false; }
            else { mostrarValidCampo('producto'); return true; }
        }
        return true;
    }

    function calcularTotal() {
        const cantidad = parseInt(document.getElementById('cantidad').value) || 0;
        const precio = parseFloat(document.getElementById('precio_unitario').value) || 0;
        document.getElementById('total').textContent = '$' + (cantidad * precio).toFixed(2);
        validarCampo('cantidad', document.getElementById('cantidad').value);
        validarCampo('precio_unitario', document.getElementById('precio_unitario').value);
    }

    function calcularNuevoStock() {
        const selectProducto = document.getElementById('producto');
        const cantidadInput = document.getElementById('cantidad');
        const nuevoStock = document.getElementById('nuevo-stock');
        if (!selectProducto || !cantidadInput || !nuevoStock) return;
        const stockActual = parseInt(selectProducto.options[selectProducto.selectedIndex].getAttribute('data-stock')) || 0;
        nuevoStock.textContent = stockActual + (parseInt(cantidadInput.value) || 0);
        validarCampo('cantidad', cantidadInput.value);
        calcularTotal();
    }

    function mostrarStockActual() {
        const selectProducto = document.getElementById('producto');
        const stockActual = document.getElementById('stock-actual');
        const selectedOption = selectProducto.options[selectProducto.selectedIndex];
        stockActual.textContent = selectedOption.getAttribute('data-stock') || 0;
        validarCampo('producto', selectProducto.value);
        calcularNuevoStock();
    }

    // Función para obtener el token CSRF de las cookies
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    $(document).ready(function() {
        $('#formAgregarEntrada').on('submit', function(e) {
            e.preventDefault();
            limpiarErrores();
            const form = $(this);
            const submitBtn = form.find('button[type="submit"]');
            const originalBtnText = submitBtn.html();
            submitBtn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i>...');

            // Obtener el token CSRF
            const csrftoken = getCookie('csrftoken');

            $.ajax({
                url: '/vistas/entrada_p/crear/',
                type: 'POST',
                data: new FormData(this),
                processData: false,
                contentType: false,
                headers: {
                    'X-CSRFToken': csrftoken
                },
                success: function(response) {
                    if (response.success) {
                        cerrarModal('modalAdd');
                        form[0].reset();
                        document.getElementById('stock-actual').textContent = '0';
                        document.getElementById('nuevo-stock').textContent = '0';
                        document.getElementById('total').textContent = '$0.00';
                        mostrarMensaje('success', response.message || 'Entrada guardada correctamente');
                        if (typeof dataTableEntradas !== 'undefined' && dataTableEntradas) dataTableEntradas.ajax.reload();
                    } else {
                        mostrarMensaje('error', response.message || 'Error al guardar');
                    }
                },
                error: function(xhr) {
                    let errorMsg = 'Error al guardar';
                    try {
                        const response = JSON.parse(xhr.responseText);
                        if (response.message) {
                            if (response.errors) {
                                Object.keys(response.errors).forEach(function(campo) {
                                    const mensajes = response.errors[campo];
                                    mostrarErrorCampo(campo, Array.isArray(mensajes) ? mensajes[0] : mensajes);
                                });
                            }
                            errorMsg = response.message;
                        }
                    } catch (e) {}
                    mostrarMensaje('error', errorMsg);
                },
                complete: function() { submitBtn.prop('disabled', false).html(originalBtnText); }
            });
        });

        $('#cantidad, #precio_unitario, #observaciones').on('blur', function() { validarCampo(this.id, this.value); });

        $('#observaciones').on('input', function() {
            const texto = $(this).val();
            const textoLimpio = texto.replace(/[+\$\#\%\&\/\)\=\*\°\<\>\[\]\{\}\"\']/g, '');
            if (texto !== textoLimpio) {
                $(this).val(textoLimpio);
                mostrarErrorCampo('observaciones', 'No se permiten caracteres especiales');
                setTimeout(function() { $('#error-observaciones').fadeOut(200, function() { $(this).text('').removeClass('show'); }); }, 1500);
            }
        });

        $('#cantidad').on('input', function() {
            let valor = $(this).val().replace(/[^0-9]/g, '');
            if (valor === '0' || valor === '') { $(this).val(''); mostrarErrorCampo('cantidad', 'La cantidad debe ser mayor a 0'); }
            else { $(this).val(valor); validarCampo('cantidad', valor); }
        });

        $('#precio_unitario').on('input', function() {
            let valor = $(this).val().replace(/[^0-9.]/g, '');
            let partes = valor.split('.');
            let final = partes[0];
            // Limitar a máximo 2 decimales
            if (partes.length > 1) {
                final += '.' + partes[1].substring(0, 2);
            }
            if (final === '0' || final === '' || parseFloat(final) <= 0) { $(this).val(''); mostrarErrorCampo('precio_unitario', 'El precio debe ser mayor a 0'); }
            else if (parseFloat(final) > 10000000) { $(this).val(final); mostrarErrorCampo('precio_unitario', 'El precio no puede superar 10,000,000'); }
            else { $(this).val(final); validarCampo('precio_unitario', final); }
        });

        $('#producto').on('change', function() { validarCampo(this.id, this.value); });
    });
</script>
