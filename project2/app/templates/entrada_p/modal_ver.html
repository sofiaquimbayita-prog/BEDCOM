{% load static %}
<div class="modal-content">
    <div class="modal-header">
        <h2><i class="fas fa-eye"></i> Detalle de Entrada</h2>
        <button type="button" class="modal-close" onclick="cerrarModal('modalView')">
            <i class="fas fa-times"></i>
        </button>
    </div>
    
    <div class="modal-body-view">
        <div class="detail-row">
            <label>ID:</label>
            <span id="view_id">--</span>
        </div>
        <div class="detail-row">
            <label>Fecha:</label>
            <span id="view_fecha">--</span>
        </div>
        <div class="detail-row">
            <label>Producto:</label>
            <span id="view_producto">--</span>
        </div>
        <div class="detail-row">
            <label>Cantidad:</label>
            <span id="view_cantidad">--</span>
        </div>
        <div class="detail-row">
            <label>Precio Unitario:</label>
            <span id="view_precio" style="color: #38bdf8; font-weight: bold;">--</span>
        </div>
        <div class="detail-row">
            <label>Total:</label>
            <span id="view_total" style="color: #2ecc71; font-weight: bold;">--</span>
        </div>
        <div class="detail-row">
            <label>Usuario:</label>
            <span id="view_usuario">--</span>
        </div>
        <div class="detail-row">
            <label>Observaciones:</label>
            <span id="view_observaciones">--</span>
        </div>
    </div>
    
    <div class="modal-footer">
        <button type="button" class="btn-cancel" onclick="cerrarModal('modalView')">
            <i class="fas fa-times"></i> Cerrar
        </button>
    </div>
</div>
