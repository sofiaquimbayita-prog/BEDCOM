{% load webpush_notifications %}
<header class="topbar-modern">
    <div class="topbar-content">
        
        <div class="nav-section">
            <div class="perfil-container">
                <button id="moduleToggle" class="icon-btn-glass" onclick="toggleModuleSidebar();" aria-label="Menú de Módulos" title="Navegar módulos">
                    <i class="fas fa-bars"></i>
                </button>
                
                {% if titulo_pagina != 'MENÚ PRINCIPAL' %}
                <a href="{% url 'menu' %}" class="icon-btn-glass home-btn" aria-label="Menú Principal" title="Ir al menú principal">
                    <i class="fas fa-home"></i>
                </a>
                {% endif %}
                
                <button onclick="history.back()" class="icon-btn-glass nav-btn" aria-label="Atrás" title="Atrás">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <button onclick="history.forward()" class="icon-btn-glass nav-btn" aria-label="Adelante" title="Adelante">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>


        <div class="title-section">
            <h1 class="main-title">{{ titulo_pagina|default:"SISTEMA DE GESTIÓN" }}</h1>
        </div>

        <div class="actions-section">
            <!--  CAMPANITA NOTIFICACIONES - Ahora como MODAL -->
            <div class="notificaciones-container">
                <button id="notifBtn" class="icon-btn-glass notif-btn" title="Notificaciones (polling)" aria-label="Notificaciones">
                    <i class="fas fa-bell"></i>
                    <span id="notif-count" class="notif-badge" style="display:none;"></span>  <!-- Added ID for global badge -->
                </button>
            </div>
            
            <!-- NOTIFICATIONS MODAL -->
            <div id="notifModal" class="notif-modal">
                <div class="notif-modal-contenido">
                    <div class="notif-modal-header">
                        <h2 class="notif-modal-titulo">
                            Notificaciones 
                        </h2>
                        <button class="notif-modal-close" onclick="closeNotifModal()" title="Cerrar">
                            &times;
                        </button>
                    </div>
                    <div class="notif-modal-body">
                        <ul class="notif-list" id="notifListModal">
                            <li class="notif-empty">Cargando...</li>
                        </ul>
                    </div>
                    <div class="notif-modal-footer">
                        <a href="{% url 'monitoreo' %}" class="notif-ver-todas">Ver todas en Monitoreo </a>
                    </div>
                </div>
            </div>
            
            <button id="perfilBtn" class="icon-btn-glass" onclick="toggleProfileSidebar();" aria-label="Menú de perfil" title="Perfil">
                <i class="fas fa-user-circle"></i>
            </button>
        </div>
    </div>
</div>
</header>


<script>
/* NOTIFICACIONES GLOBAL - HEADER BELL MODAL */
let notifPolling;

function toggleNotifModal() {
    const modal = document.getElementById('notifModal');
    const headerRect = document.querySelector('header.topbar-modern').getBoundingClientRect();
    const scrollY = window.scrollY;
    modal.style.position = 'fixed';
    modal.style.top = (headerRect.bottom + scrollY) + 'px';
    modal.style.right = (window.innerWidth - headerRect.right + 20) + 'px';
    modal.style.zIndex = '10020';
    modal.classList.toggle('show');
    if (modal.classList.contains('show')) {
        cargarNotificacionesModal(true);
        updateGlobalBadge(); // Sync badge
    }
}

function closeNotifModal() {
    document.getElementById('notifModal').classList.remove('show');
}

function cargarNotificacionesModal(force=false) {
    fetch('/vistas/monitoreo/api/notificaciones/')
        .then(res => res.json())
        .then(data => {
            // Update GLOBAL badge first
            if (data.success) {
                window.updateGlobalBadge(data);
            }
            // Legacy badge support
            const badge = document.getElementById('notifBadge');
            if (badge && data.success) {
                if (data.count > 0) {
                    badge.textContent = data.count > 99 ? '99+' : data.count;
                    badge.style.display = 'flex';
                } else {
                    badge.style.display = 'none';
                }
            }
            
            if (data.success) {
                // Update modal count (null-safe)
                const countEl = document.getElementById('notifCountModal');
                if (countEl) countEl.textContent = data.count || 0;
                
                // Update modal list
                const list = document.getElementById('notifListModal');  
                if (list) {
                    const notifsArray = data.data || [];
                    if (notifsArray.length === 0) {
                        list.innerHTML = '<li class="notif-empty">Sin notificaciones nuevas </li>';
                    } else {
                        let html = '';
                        // Solo mostramos las últimas 5 en la campanita
                        notifsArray.slice(0, 5).forEach(n => {
                            const tiempo = new Date(n.fecha_notif).toLocaleString('es-CO');
                            const unread = n.leida ? '' : 'unread';
                            html += `
                                <li class="notif-item ${unread}" onclick="marcarLeidaYRedirigir(${n.id}, '${n.tipo}')">
                                    <div class="notif-content">
                                        <div class="notif-titulo">${n.titulo}</div>
                                    </div>
                                </li>
                            `;
                        });
                        list.innerHTML = html;
                    }
                }
            }
        })
        .catch(err => console.error('Notif error:', err));
}

function marcarLeidaYRedirigir(id, tipo) {
    let urlDestino = '/vistas/monitoreo/'; // fallback
    switch(tipo) {
        case 'bajo_stock_insumo': urlDestino = '/vistas/insumos/'; break;
        case 'bajo_stock_producto': urlDestino = '/vistas/productos/'; break;
        case 'calendario_hoy':
        case 'calendario_manaña': urlDestino = '/vistas/calendario/'; break;
        case 'pendido_despacho': urlDestino = '/vistas/despacho/'; break;
        case 'sin_bom': urlDestino = '/vistas/bom/'; break;
        case 'pago_pendiente': urlDestino = '/vistas/pedido/'; break;
        case 'mantenimiento_nueva': urlDestino = '/vistas/mantenimientos/'; break;
        case 'reporte_generado': urlDestino = '/vistas/reportes/'; break;
    }

    // Helper CSRF local
    function getCookieLocal(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    fetch(`/vistas/monitoreo/api/notif-read/${id}/`, {
        method: 'POST',
        headers: {
            'X-CSRFToken': getCookieLocal('csrftoken'),
            'Content-Type': 'application/json'
        }
    }).then(() => {
        window.location.href = urlDestino;
    }).catch(err => {
        console.error('Error al marcar leída:', err);
        window.location.href = urlDestino; // Redirigir de todos modos
    });
}

// Event listeners
document.addEventListener('DOMContentLoaded', function() {
    // Bell click
    document.getElementById('notifBtn')?.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleNotifModal();
    });
    
    // Backdrop close
    document.getElementById('notifModal')?.addEventListener('click', (e) => {
        if (e.target.id === 'notifModal') closeNotifModal();
    });
    
    // ESC close
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.getElementById('notifModal').classList.contains('show')) {
            closeNotifModal();
        }
    });
});

/* GLOBAL BADGE UPDATE */
window.updateGlobalBadge = function(data) {
    const badge = document.getElementById('notif-count');
    if (!badge) return;
    if (data && data.success && data.count > 0) {
        badge.textContent = data.count > 99 ? '99+' : data.count;
        badge.style.display = 'flex';
    } else {
        badge.style.display = 'none';
    }
};

// Init polling 30s - global (single interval)
window.initNotifPolling = function() {
    if (notifPolling) clearInterval(notifPolling);
    cargarNotificacionesModal();
    notifPolling = setInterval(cargarNotificacionesModal, 30000);
};
if (document.getElementById('notifBtn')) window.initNotifPolling();

// Cleanup
window.addEventListener('beforeunload', () => {
    if (notifPolling) clearInterval(notifPolling);
});

</script>
