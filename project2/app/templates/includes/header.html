{% load webpush_notifications %}
<header class="topbar-modern">
    <div class="topbar-content">
        <div class="perfil-section">
            <div class="perfil-container">
                <!-- Siempre mostrar perfil + toggle en menú principal, y toggle + home en otros módulos -->
                <button id="moduleToggle" class="icon-btn-glass" onclick="toggleModuleSidebar();" aria-label="Menú de Módulos" title="Navegar módulos">
                    <i class="fas fa-bars"></i>
                </button>
                
                {% if titulo_pagina != 'MENÚ PRINCIPAL' %}
                <a href="{% url 'menu' %}" class="icon-btn-glass home-btn" aria-label="Menú Principal" title="Ir al menú principal">
                    <i class="fas fa-home"></i>
                </a>
                {% endif %}
                
                <!-- Navegación atrás/adelante -->
                <button onclick="history.back()" class="icon-btn-glass nav-btn" aria-label="Atrás" title="Atrás">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <button onclick="history.forward()" class="icon-btn-glass nav-btn" aria-label="Adelante" title="Adelante">
                    <i class="fas fa-arrow-right"></i>
                </button>
                
                <style>
                .nav-btn {
                    opacity: 0.7;
                }
                .nav-btn:hover {
                    opacity: 1;
                    transform: scale(1.05);
                }
                </style>
            </div>
        </div>


        <div class="title-section">
            <h1 class="main-title">{{ titulo_pagina|default:"SISTEMA DE GESTIÓN" }}</h1>
        </div>

        <div class="actions-section">
            <!--  CAMPANITA NOTIFICACIONES - Ahora como MODAL -->
            <div class="notificaciones-container">
                <button id="notifBtn" class="icon-btn-glass notif-btn" title="Notificaciones (polling)" aria-label="Notificaciones">
                    <i class="fas fa-bell"></i>
                    <span id="notif-count" class="notif-badge" style="display:none;"></span>  <!-- Added ID for global badge -->
                </button>
            </div>
            
            <!-- NOTIFICATIONS MODAL -->
            <div id="notifModal" class="notif-modal">
                <div class="notif-modal-contenido">
                    <div class="notif-modal-header">
                        <h2 class="notif-modal-titulo">
                            Notificaciones 
                        </h2>
                        <button class="notif-modal-close" onclick="closeNotifModal()" title="Cerrar">
                            &times;
                        </button>
                    </div>
                    <div class="notif-modal-body">
                        <ul class="notif-list" id="notifListModal">
                            <li class="notif-empty">Cargando...</li>
                        </ul>
                    </div>
                    <div class="notif-modal-footer">
                        <a href="{% url 'monitoreo' %}" class="notif-ver-todas">Ver todas en Monitoreo </a>
                    </div>
                </div>
            </div>
            
            <button id="perfilBtn" class="icon-btn-glass" onclick="toggleProfileSidebar();" aria-label="Menú de perfil" title="Perfil">
                <i class="fas fa-user-circle"></i>
            </button>
        </div>
    </div>
</header>


<script>
/* NOTIFICACIONES GLOBAL - HEADER BELL MODAL */
let notifPolling;

function toggleNotifModal() {
    const modal = document.getElementById('notifModal');
    const headerRect = document.querySelector('header.topbar-modern').getBoundingClientRect();
    const scrollY = window.scrollY;
    modal.style.position = 'fixed';
    modal.style.top = (headerRect.bottom + scrollY) + 'px';
    modal.style.right = (window.innerWidth - headerRect.right + 20) + 'px';
    modal.style.zIndex = '10020';
    modal.classList.toggle('show');
    if (modal.classList.contains('show')) {
        cargarNotificacionesModal(true);
        updateGlobalBadge(); // Sync badge
    }
}

function closeNotifModal() {
    document.getElementById('notifModal').classList.remove('show');
}

function cargarNotificacionesModal(force=false) {
    fetch('/vistas/monitoreo/api/notificaciones/')
        .then(res => res.json())
        .then(data => {
            // Update GLOBAL badge first
            if (data.success) {
                window.updateGlobalBadge(data);
            }
            // Legacy badge support
            const badge = document.getElementById('notifBadge');
            if (badge && data.success) {
                if (data.count > 0) {
                    badge.textContent = data.count > 99 ? '99+' : data.count;
                    badge.style.display = 'flex';
                } else {
                    badge.style.display = 'none';
                }
            }
            
            if (data.success) {
                // Update modal count (null-safe)
                const countEl = document.getElementById('notifCountModal');
                if (countEl) countEl.textContent = data.count || 0;
                
                // Update modal list
                const list = document.getElementById('notifListModal');  
                if (list) {
                    if ((data.notificaciones || []).length === 0) {
                        list.innerHTML = '<li class="notif-empty">Sin notificaciones nuevas </li>';
                    } else {
                        let html = '';
                        (data.notificaciones || []).forEach(n => {
                            const tiempo = new Date(n.fecha_notif).toLocaleString('es-CO');
                            const unread = n.leida ? '' : 'unread';
                            html += `
                                <li class="notif-item ${unread}" onclick="marcarLeidaModal(${n.id})">
                                    <div class="notif-icon"></div>
                                    <div class="notif-content">
                                        <div class="notif-titulo">${n.titulo}</div>
                                        <div class="notif-mensaje">${n.mensaje}</div>
                                        <div class="notif-tiempo">${tiempo}</div>
                                    </div>
                                </li>
                            `;
                        });
                        list.innerHTML = html;
                    }
                }
            }
        })
        .catch(err => console.error('Notif error:', err));
}

function marcarLeidaModal(id) {
    fetch(`/monitoreo/api/notif-read/${id}/`, {method: 'POST'})
        .then(() => cargarNotificacionesModal(true));
}

// Event listeners
document.addEventListener('DOMContentLoaded', function() {
    // Bell click
    document.getElementById('notifBtn')?.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleNotifModal();
    });
    
    // Backdrop close
    document.getElementById('notifModal')?.addEventListener('click', (e) => {
        if (e.target.id === 'notifModal') closeNotifModal();
    });
    
    // ESC close
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.getElementById('notifModal').classList.contains('show')) {
            closeNotifModal();
        }
    });
});

/* GLOBAL BADGE UPDATE */
window.updateGlobalBadge = function(data) {
    const badge = document.getElementById('notif-count');
    if (!badge) return;
    if (data && data.success && data.count > 0) {
        badge.textContent = data.count > 99 ? '99+' : data.count;
        badge.style.display = 'flex';
    } else {
        badge.style.display = 'none';
    }
};

// Init polling 30s - global (single interval)
window.initNotifPolling = function() {
    if (notifPolling) clearInterval(notifPolling);
    cargarNotificacionesModal();
    notifPolling = setInterval(cargarNotificacionesModal, 30000);
};
if (document.getElementById('notifBtn')) window.initNotifPolling();

// Cleanup
window.addEventListener('beforeunload', () => {
    if (notifPolling) clearInterval(notifPolling);
});

</script>

<div id="modalPerfil" class="modal-logout-overlay oculto">
<div class="modal-confirmacion-content profile-modal-card" style="max-height: 80vh; overflow-y: auto;">
        <div class="modal-confirmacion-header">
            <h2>Perfil de Usuario</h2>
        </div>

        <form id="formPerfil" class="profile-form-grid" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-grid-row">
                <div class="input-group">
                    <label>Cédula</label>
                    <input type="number" id="perfilCedula" name="cedula" class="input-field" required maxlength="10">
                </div>
                <div class="input-group">
                    <label>Rol</label>
                    <input type="text" id="perfilRol" class="readonly-field" readonly>
                </div>
            </div>

            <div class="input-group full">
                <label>Foto de Perfil</label>
                <div class="foto-preview-container">
                    <div class="foto-wrapper">
                        <img id="fotoPreview" src="" alt="Foto actual" class="foto-preview" style="display: none;">
                        <i class="fas fa-user" id="fotoIcon" style="font-size: 4rem; color: #94a3b8;"></i>
                    </div>
                </div>
                <input type="file" id="perfilFoto" name="foto_perfil" accept="image/*" class="input-field">
                <small>Selecciona una imagen JPG/PNG (máx 2MB)</small>
            </div>

            <div class="input-group full">
                <label for="perfilNombre">Nombre de Usuario</label>
                <input type="text" id="perfilNombre" name="nombre_usuario" required>
            </div>

<div class="input-group full">
                <label for="perfilEmail">Correo Electrónico</label>
                <input type="email" id="perfilEmail" name="email" required>
            </div>

            <div class="form-grid-row">
                <div class="input-group">
                    <label>Teléfono</label>
                    <input type="number" id="perfilTelefono" name="telefono" class="input-field" placeholder="Ej: 3101234567" required maxlength="10">
                </div>
                <div class="input-group">
                    <label>Nombre(s)</label>
                    <input type="text" id="perfilFirstName" name="first_name" class="input-field">
                </div>
            </div>

            <div class="form-grid-row">
                <div class="input-group">
                    <label>Apellido(s)</label>
                    <input type="text" id="perfilLastName" name="last_name" class="input-field">
                </div>
            </div>

            <div class="form-grid-row">
                <div class="input-group">
                    <label>Nueva Contraseña (opcional)</label>
                    <input type="password" id="perfilPassword" name="password" class="input-field" placeholder="Dejar vacío para no cambiar">
                </div>
                <div class="input-group">
                    <label>Confirmar Contraseña</label>
                    <input type="password" id="perfilConfirmPassword" name="confirm_password" class="input-field" placeholder="Confirme">
                </div>
            </div>

            <div class="input-group full">
                <label>Estado de Cuenta</label>
                <input type="text" id="perfilEstado" class="readonly-field" readonly>
            </div>

<style>
                .foto-preview-container {
                    text-align: center;
                    margin-bottom: 10px;
                }
.foto-wrapper {
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    width: 100px;
                    height: 100px;
                    margin: 0 auto;
                }
                .foto-preview {
                    width: 100px;
                    height: 100px;
                    border-radius: 50%;
                    object-fit: cover;
                    border: 3px solid #38bdf8;
                }
                #fotoIcon {
                    width: 100px;
                    height: 100px;
                    line-height: 100px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                }
                .form-grid-row {
                    display: flex;
                    gap: 15px;
                    margin-bottom: 15px;
                }
                .input-group {
                    flex: 1;
                }
            </style>
            <div class="modal-confirmacion-botones">
                <button type="button" id="cancelarPerfil" class="btn-cancelar">Cancelar</button>
                <button type="submit" class="btn-confirmar">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
