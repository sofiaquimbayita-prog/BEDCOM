{% load static %}
<div id="BOM_AGREGAR_PRODUCTO" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 500px;">
        <div class="modal-header">
            <h3><i class="fas fa-box"></i> Nuevo Producto</h3>
            <button class="close-modal" onclick="cerrarModal('BOM_AGREGAR_PRODUCTO')">&amp;times;</button>
        </div>
        <form id="formBomAgregarProducto">
            {% csrf_token %}
            <div class="form-group">
                <label>Nombre del Producto *</label>
                <input type="text" name="nombre" required placeholder="Ej: Base Baúl Premium" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div class="form-group">
                <label>Categoría *</label>
                <select name="categoria" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                    <option value="">Seleccione categoría</option>
                    {{ categorias|safe }}
                </select>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="cerrarModal('BOM_AGREGAR_PRODUCTO')">Cancelar</button>
                <button type="submit" class="btn-save">Crear Producto</button>
            </div>
        </form>
    </div>
</div>
