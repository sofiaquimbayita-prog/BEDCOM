{% load static %}
<link rel="stylesheet" href="{% static 'ap1/css/styles_categorias.css' %}">
<div class="modal-content">
    <div class="modal-header">
        <h2><i class="fas fa-folder-plus"></i> Nueva Categoría</h2>
    </div>
    
    <form id="formCategoria" method="POST" action="{% url 'crear_categoria' %}">
        {% csrf_token %}
        
        <div class="form-group">
            <label>NOMBRE DE LA CATEGORÍA</label>
            <input type="text" name="nombre" id="inputNombre" placeholder="Ej: Camas, Colchones, Muebles">
            <span class="error-msg" id="errorNombre"></span>
        </div>

        <div class="form-group">
            <label>DESCRIPCIÓN</label>
            <textarea name="descripcion" id="inputDescripcion" rows="3" placeholder="Ej: Categoría para productos de cama..."></textarea>
            <span class="error-msg" id="errorDescripcion"></span>
        </div>

        <input type="hidden" name="tipo" value="producto">

        <div class="modal-footer">
            <button type="button" class="btn-cancel" onclick="cerrarModal('modalCategoria')">Cancelar</button>
            <button type="submit" id="btnGuardar" class="btn-save">Guardar</button>
        </div>
    </form>
</div>
