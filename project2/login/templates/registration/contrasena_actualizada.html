{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Listo! - BEDCOM</title>
    <link rel="stylesheet" href="{% static 'ap1/css/global.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" href="{% static 'ap1/img/icono.png' %}" type="image/png">
</head>
<body>
    <div class="idioma-container">
        <button class="boton-idioma"><i class="fa-solid fa-globe"></i> ES</button>
    </div>
    <div class="ayuda-container">
        <button class="boton-ayuda"><i class="fa-solid fa-question"></i></button>
    </div>

    <h1 class="titulo">¡LISTO!</h1>

    <div class="contenedor">
        <div class="formulario" style="text-align: center;">
            
            <div style="margin: 10px 0 25px 0;">
                <i class="fas fa-check-circle fa-4x" style="color: var(--ok);"></i>
            </div>

            <h2 style="color: var(--text); margin-bottom: 15px; font-size: 1.4rem;">Contraseña actualizada</h2>
            
            <p class="instruccion-clara">
                Tu contraseña ha sido cambiada exitosamente. Ahora puedes acceder a tu cuenta de BEDCOM con tus nuevas credenciales.
            </p>

            <a href="{% url 'login:login' %}" class="botonr">
                INICIAR SESIÓN
            </a>

            <div class="pregunta" style="margin-top: 25px;">
                <span style="color: var(--muted); font-size: 0.85rem;">¿Problemas?</span> 
                <a href="{% url 'login:password_reset' %}">Recuperar otra vez</a>
            </div>
        </div>
    </div>
</body>
</html>
