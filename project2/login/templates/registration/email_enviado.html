{% load static %}
<link rel="stylesheet" href="{% static 'ap1/css/global.css' %}">
<div class="contenedor">
    <h1 class="titulo">CORREO ENVIADO</h1>
    
    <div class="formulario">
        <div class="mensaje-django mensaje-exito">
            <i class="fas fa-check-circle"></i>
            ¡Revisa tu bandeja de entrada!
        </div>
        
        <div style="text-align: center; margin: 20px 0;">
            <i class="fas fa-envelope fa-3x" style="color: #10b981;"></i>
        </div>
        
        <p style="margin-bottom: 15px; line-height: 1.5;">
            Si existe una cuenta con ese correo electrónico, te hemos enviado 
            las instrucciones para restablecer tu contraseña.
        </p>
        
        <p style="font-size: 0.85em; color: var(--muted); margin-bottom: 25px;">
            <i class="fas fa-info-circle"></i>
            Revisa también la carpeta de spam.
        </p>
        
        <div class="acciones-recuperacion">
            <a href="{% url 'login:login' %}" class="botonr" style="display: inline-block; text-decoration: none; width: 100%; margin-bottom: 15px;">
                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
            </a>
            
            <a href="{% url 'login:password_reset' %}" style="color: var(--brand); text-decoration: none; font-size: 0.9em;">
                <i class="fas fa-redo"></i> Enviar otro correo
            </a>
        </div>
    </div>
</div>
