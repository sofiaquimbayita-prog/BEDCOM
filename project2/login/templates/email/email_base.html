<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEDCOM</title>
</head>
<body style="margin:0;padding:0;background-color:#f3f4f6;font-family:'Segoe UI',Arial,Helvetica,sans-serif;">
<table role="presentation" cellpadding="0" cellspacing="0" style="width:100%;max-width:600px;margin:0 auto;background-color:#ffffff;">
  <tr>
    <td style="background-color:#1e3a5f;padding:25px 20px;text-align:center;">
      <h1 style="color:#ffffff;margin:0;font-size:28px;font-weight:700;letter-spacing:2px;">BEDCOM</h1>
      <p style="color:#93c5fd;margin:5px 0 0 0;font-size:13px;">Sistema de Gestión Empresarial</p>
    </td>
  </tr>
  <tr>
    <td style="padding:35px 30px;background-color:#ffffff;">
      {% block content %}{% endblock %}
    </td>
  </tr>
  <tr>
    <td style="background-color:#f3f4f6;padding:20px 30px;text-align:center;border-top:1px solid #e5e7eb;">
      <p style="margin:0 0 5px 0;font-size:12px;color:#6b7280;">&copy; 2026 BEDCOM &mdash; Todos los derechos reservados.</p>
      <p style="margin:0;font-size:11px;color:#9ca3af;">Este es un mensaje automático, por favor no respondas a este correo.</p>
    </td>
  </tr>
</table>
</body>
</html>
